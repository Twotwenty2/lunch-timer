<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return to desk</title>
    <style>
        :root {
            --primary-color: #7986cb; 
            --accent-color: #f06292;   
            --buffer-color: #26a69a; 
            --text-dark: #f1f5f9;
            --text-light: #94a3b8;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
        }

        .container {
            background: rgba(15, 23, 42, 0.9);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 420px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { 
            color: white; 
            margin-bottom: 0.5rem;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .instruction {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .refresh-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
        }

        .refresh-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(-180deg);
        }

        .refresh-btn svg { width: 24px; height: 24px; fill: var(--primary-color); }

        input[type="time"] {
            flex-grow: 1;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            outline: none;
        }

        .duration-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .btn-choice {
            padding: 14px 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-choice.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .toggle-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 20px;
            border-radius: 15px;
            margin-bottom: 2rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-label { font-weight: 500; color: var(--buffer-color); }

        .result-area {
            background: rgba(0, 0, 0, 0.4);
            padding: 2rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-text { 
            font-size: 0.85rem; 
            color: var(--text-light); 
            text-transform: uppercase; 
            letter-spacing: 0.2em;
        }

        #finalTime {
            display: block;
            font-size: 4rem; 
            font-weight: 800;
            color: white;
            margin: 0.5rem 0;
        }

        #calcLog {
            font-size: 0.8rem;
            color: var(--text-light);
            opacity: 0.7;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Return to desk</h1>
    <p class="instruction">Simple break & lunch tracker</p>
    
    <div class="input-group">
        <button class="refresh-btn" onclick="resetToNow()">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <input type="time" id="startTime" oninput="updateTime()">
    </div>

    <div class="duration-grid">
        <button class="btn-choice" data-min="15" onclick="setMode(15)">15m</button>
        <button class="btn-choice active" data-min="30" onclick="setMode(30)">30m</button>
        <button class="btn-choice" data-min="60" onclick="setMode(60)">1h</button>
    </div>

    <label class="toggle-box">
        <span class="toggle-label">2m Walk Back Buffer</span>
        <input type="checkbox" id="walkMode" onchange="updateTime()">
    </label>

    <div class="result-area">
        <span class="label-text" id="statusLabel">Return to desk at</span>
        <span id="finalTime">--:--</span>
        <span id="calcLog"></span>
    </div>
</div>

<script>
    let currentDuration = 30;

    window.onload = resetToNow;

    function resetToNow() {
        const d = new Date();
        document.getElementById('startTime').value = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        updateTime();
    }

    function setMode(m) {
        currentDuration = m;
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
        document.querySelector(`.btn-choice[data-min="${m}"]`).classList.add('active');
        updateTime();
    }

    function updateTime() {
        const val = document.getElementById('startTime').value;
        if (!val) return;

        let [h, m] = val.split(':').map(Number);
        let adjust = currentDuration;
        let log = `${currentDuration}m break`;

        if (document.getElementById('walkMode').checked) {
            adjust -= 2;
            log += ` - 2m walk`;
            document.getElementById('statusLabel').innerText = "Leave for desk at";
            document.getElementById('finalTime').style.color = "var(--buffer-color)";
        } else {
            document.getElementById('statusLabel').innerText = "Return to desk at";
            document.getElementById('finalTime').style.color = "white";
        }

        let totalMins = (h * 60) + m + adjust;
        if (totalMins < 0) totalMins += 1440;

        let resH = Math.floor((totalMins / 60) % 24);
        let resM = Math.floor(totalMins % 60);

        const ampm = resH >= 12 ? 'PM' : 'AM';
        const displayH = resH % 12 || 12;
        const displayM = String(resM).padStart(2, '0');

        document.getElementById('finalTime').innerText = `${displayH}:${displayM} ${ampm}`;
        document.getElementById('calcLog').innerText = `(${log})`;
    }
</script>

</body>
</html>
