<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Return to desk</title>
    <style>
        :root {
            --primary-color: #7986cb; 
            --accent-color: #f06292;   
            --buffer-color: #26a69a; 
            --text-dark: #f1f5f9;
            --text-light: #94a3b8;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            overflow: hidden;
        }

        .container {
            position: relative;
            background: rgba(15, 23, 42, 0.9);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 420px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        /* Timezone Trigger Area */
        .tz-trigger-wrapper {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .tz-trigger-wrapper:hover {
            opacity: 1;
        }

        .tz-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-light);
        }

        .corner-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--primary-color);
            filter: drop-shadow(0 0 8px rgba(121, 134, 203, 0.4));
            display: block;
        }

        /* Timezone Popup Window */
        #timezonePopup {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background: rgba(30, 41, 59, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 15px;
            width: 210px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            z-index: 100;
            text-align: left;
        }

        .tz-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }

        .tz-row:last-child { border: none; margin-bottom: 0; }
        .tz-name { color: var(--text-light); font-weight: 600; }
        .tz-time { color: white; font-family: 'Courier New', Courier, monospace; font-weight: bold; }

        h1 { color: white; margin-bottom: 0.5rem; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; }
        .instruction { color: var(--text-light); font-size: 0.95rem; margin-bottom: 2rem; }

        .input-group { display: flex; gap: 15px; margin-bottom: 1.5rem; align-items: center; }

        .refresh-btn {
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(121, 134, 203, 0.4);
        }

        .refresh-btn:hover { transform: scale(1.1) rotate(-180deg); background: #8e99d6; }
        .refresh-btn svg { width: 28px; height: 28px; fill: white; }

        input[type="time"] {
            flex-grow: 1;
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            color: white;
            background: rgba(0, 0, 0, 0.4);
            outline: none;
        }

        .duration-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }

        .btn-choice {
            padding: 14px 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-choice.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .toggle-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 14px 20px;
            border-radius: 15px;
            margin-bottom: 2rem;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .toggle-label { font-weight: 500; color: var(--buffer-color); }

        .result-area {
            background: rgba(0, 0, 0, 0.4);
            padding: 2rem;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label-text { font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.2em; }
        #finalTime { display: block; font-size: 4rem; font-weight: 800; color: white; margin: 0.5rem 0; }
        #calcLog { font-size: 0.8rem; color: var(--text-light); opacity: 0.7; }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <div class="tz-trigger-wrapper" id="tzTrigger" onclick="event.stopPropagation(); togglePopup();">
        <span class="tz-label">Time Zones</span>
        <div class="corner-icon">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        </div>
        
        <div id="timezonePopup">
            <div class="tz-row"><span class="tz-name">Eastern</span><span class="tz-time" id="tz-et"></span></div>
            <div class="tz-row"><span class="tz-name">Central</span><span class="tz-time" id="tz-ct"></span></div>
            <div class="tz-row"><span class="tz-name">Mountain</span><span class="tz-time" id="tz-mt"></span></div>
            <div class="tz-row"><span class="tz-name">Pacific</span><span class="tz-time" id="tz-pt"></span></div>
        </div>
    </div>

    <h1>Return to desk</h1>
    <p class="instruction">Break & lunch return tracker</p>
    
    <div class="input-group">
        <button class="refresh-btn" onclick="resetToNow()" title="Reset to Current Time">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        <input type="time" id="startTime" oninput="updateTime()">
    </div>

    <div class="duration-grid">
        <button class="btn-choice" data-min="15" onclick="setMode(15)">15m</button>
        <button class="btn-choice active" data-min="30" onclick="setMode(30)">30m</button>
        <button class="btn-choice" data-min="60" onclick="setMode(60)">1h</button>
    </div>

    <label class="toggle-box">
        <span class="toggle-label">2m Walk Back Buffer</span>
        <input type="checkbox" id="walkMode" onchange="updateTime()">
    </label>

    <div class="result-area">
        <span class="label-text" id="statusLabel">Return to desk at</span>
        <span id="finalTime">--:--</span>
        <span id="calcLog"></span>
    </div>
</div>

<script>
    let currentDuration = 30;

    window.onload = function() {
        resetToNow();
        updateUSATimes();
        setInterval(updateUSATimes, 30000); 

        // Close popup when clicking anywhere else
        document.addEventListener('click', function(event) {
            const popup = document.getElementById('timezonePopup');
            const trigger = document.getElementById('tzTrigger');
            if (!trigger.contains(event.target)) {
                popup.style.display = 'none';
            }
        });
    };

    function togglePopup() {
        const popup = document.getElementById('timezonePopup');
        popup.style.display = (popup.style.display === 'block') ? 'none' : 'block';
    }

    function updateUSATimes() {
        const zones = {
            'tz-et': 'America/New_York',
            'tz-ct': 'America/Chicago',
            'tz-mt': 'America/Denver',
            'tz-pt': 'America/Los_Angeles'
        };
        for (const [id, zone] of Object.entries(zones)) {
            const timeStr = new Date().toLocaleTimeString('en-US', {
                timeZone: zone,
                hour: '2-digit',
                minute: '2-digit',
                hour12: true
            });
            document.getElementById(id).innerText = timeStr;
        }
    }

    function resetToNow() {
        const d = new Date();
        document.getElementById('startTime').value = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        updateTime();
    }

    function setMode(m) {
        currentDuration = m;
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
        document.querySelector(`.btn-choice[data-min="${m}"]`).classList.add('active');
        updateTime();
    }

    function updateTime() {
        const val = document.getElementById('startTime').value;
        if (!val) return;
        let [h, m] = val.split(':').map(Number);
        let adjust = currentDuration;
        if (document.getElementById('walkMode').checked) {
            adjust -= 2;
            document.getElementById('statusLabel').innerText = "Leave for desk at";
            document.getElementById('finalTime').style.color = "var(--buffer-color)";
        } else {
            document.getElementById('statusLabel').innerText = "Return to desk at";
            document.getElementById('finalTime').style.color = "white";
        }
        let totalMins = (h * 60) + m + adjust;
        if (totalMins < 0) totalMins += 1440;
        let resH = Math.floor((totalMins / 60) % 24);
        let resM = Math.floor(totalMins % 60);
        const ampm = resH >= 12 ? 'PM' : 'AM';
        const displayH = resH % 12 || 12;
        const displayM = String(resM).padStart(2, '0');
        document.getElementById('finalTime').innerText = `${displayH}:${displayM} ${ampm}`;
        document.getElementById('calcLog').innerText = `(${currentDuration}m break${document.getElementById('walkMode').checked ? ' - 2m walk' : ''})`;
    }
</script>

</body>
</html>
