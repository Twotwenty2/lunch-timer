<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>You've got time</title>
    <meta name="title" content="You've got time - Simple Break & Lunch Tracker">
    <meta name="description" content="A high-performance break tracker designed for shift workers. Never miss a clock-in with our built-in walk-back buffer.">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://youve-got-time.netlify.app/"> 
    <meta property="og:title" content="You've got time - Simple Break & Lunch Tracker">
    <meta property="og:description" content="The intuitive way to track your breaks. Features a unique 2-minute walk-back buffer to keep your adherence perfect.">
    <meta property="og:image" content="https://yourwebsite.com/preview-image.jpg"> 

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://youve-got-time.netlify.app/">
    <meta property="twitter:title" content="You've got time - Simple Break & Lunch Tracker">
    <meta property="twitter:description" content="Built for performance. Optimized for your workspace. Simple, accurate break tracking.">
    <meta property="twitter:image" content="https://yourwebsite.com/preview-image.jpg">

    <style>
        :root {
            --primary-color: #7986cb; 
            --accent-color: #f06292;   
            --buffer-color: #26a69a; 
            --text-dark: #f1f5f9;
            --text-light: #cbd5e1;
            --bg-gradient: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            --popup-bg-solid: #0f172a; 
            --ring-color: rgba(121, 134, 203, 0.5);
            --highlight-bg: rgba(255, 255, 255, 0.25);
            --coffee-color: #FFDD00;
        }

        body {
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        .container {
            position: relative;
            background: rgba(15, 23, 42, 0.95);
            padding: 2rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 90%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-sizing: border-box;
        }

        @media (max-width: 380px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 1.8rem; }
            #finalTime { font-size: 3.2rem !important; }
            .tz-label { display: none; } 
        }

        /* Timezone Trigger */
        .tz-trigger-wrapper {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            z-index: 20;
            opacity: 0.9;
            padding: 5px 10px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .tz-trigger-wrapper:hover {
            box-shadow: 0 0 0 2px var(--ring-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .tz-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; color: white; }
        .corner-icon svg { width: 20px; height: 20px; fill: #ffffff; display: block; }

        #timezonePopup {
            display: none;
            position: absolute;
            top: 0; 
            left: 105%; 
            background-color: var(--popup-bg-solid);
            border: 2px solid var(--primary-color);
            border-radius: 12px;
            padding: 16px;
            width: 190px;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5); 
            z-index: 100;
            text-align: left;
        }

        @media (max-width: 900px) {
            #timezonePopup { left: auto; right: 0; top: 50px; }
        }

        .tz-row { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 10px; 
            font-size: 0.85rem; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            padding-bottom: 6px;
        }
        
        .tz-name, .tz-time { color: #ffffff; }

        h1 { color: white; margin-bottom: 0.5rem; font-size: 2.1rem; font-weight: 700; }
        .instruction { color: var(--text-light); font-size: 0.9rem; margin-bottom: 1.5rem; }

        .input-group { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 1.2rem; 
            align-items: center; 
        }

        .custom-time-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }

        input[type="time"] {
            width: 100%;
            padding: 12px;
            padding-right: 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.15); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease-in-out;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="time"]:hover, input[type="time"]:focus {
            background: var(--highlight-bg);
            border-color: white;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        input[type="time"]::-webkit-calendar-picker-indicator {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: auto; height: auto;
            background: transparent;
            color: transparent;
            cursor: pointer;
        }

        .manual-clock-icon {
            position: absolute;
            right: 15px;
            pointer-events: none;
            width: 20px;
            height: 20px;
            fill: white;
        }

        .refresh-btn {
            background: var(--primary-color);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .refresh-btn:hover { 
            transform: scale(1.1) rotate(360deg);
            background: #8e99d6;
        }

        .duration-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.2rem; }

        .btn-choice {
            padding: 12px 2px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-choice:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-choice.active { 
            background: var(--primary-color); 
            color: white; 
            border-color: var(--primary-color);
        }

        .toggle-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toggle-box:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--buffer-color);
        }

        .result-area {
            background: rgba(0, 0, 0, 0.5);
            padding: 1.5rem;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #finalTime { font-size: 3.8rem; font-weight: 800; color: white; margin: 0.2rem 0; }
        .ampm { font-size: 1.5rem; margin-left: 5px; vertical-align: middle; }
        #calcLog { font-size: 0.75rem; color: #cbd5e1; }

        /* BUY ME A COFFEE STYLING */
        .coffee-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .coffee-link:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--coffee-color);
            transform: translateY(-2px);
        }

        .coffee-icon {
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tz-trigger-wrapper" id="tzTrigger" onclick="event.stopPropagation(); togglePopup();">
        <span class="tz-label">Time Zones</span>
        <div class="corner-icon">
            <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        </div>
        <div id="timezonePopup">
            <div class="tz-row"><span class="tz-name">Eastern</span><span class="tz-time" id="tz-et"></span></div>
            <div class="tz-row"><span class="tz-name">Central</span><span class="tz-time" id="tz-ct"></span></div>
            <div class="tz-row"><span class="tz-name">Mountain</span><span class="tz-time" id="tz-mt"></span></div>
            <div class="tz-row"><span class="tz-name">Pacific</span><span class="tz-time" id="tz-pt"></span></div>
        </div>
    </div>

    <h1>You've got time</h1>
    <p class="instruction">Simple break & lunch tracker</p>
    
    <div class="input-group">
        <button class="refresh-btn" onclick="resetToNow()" title="Current Time">
            <svg viewBox="0 0 24 24" style="width:24px; height:24px; fill:white;"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        </button>
        
        <div class="custom-time-wrapper">
            <input type="time" id="startTime" oninput="updateTime()">
            <svg class="manual-clock-icon" viewBox="0 0 24 24">
                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
            </svg>
        </div>
    </div>

    <div class="duration-grid">
        <button class="btn-choice" data-min="15" onclick="setMode(15)">15m</button>
        <button class="btn-choice active" data-min="30" onclick="setMode(30)">30m</button>
        <button class="btn-choice" data-min="60" onclick="setMode(60)">1h</button>
    </div>

    <label class="toggle-box">
        <span style="font-size: 0.9rem; color: var(--buffer-color); font-weight: 600;">2m Walk Back Buffer</span>
        <input type="checkbox" id="walkMode" onchange="updateTime()">
    </label>

    <div class="result-area">
        <span class="label-text" id="statusLabel" style="font-size: 0.75rem; letter-spacing: 0.15em; color: white; text-transform: uppercase;">Return to desk at</span>
        <div id="timeDisplay">
            <span id="finalTime">--:--</span>
        </div>
        <span id="calcLog"></span>
    </div>

    <a href="https://www.buymeacoffee.com/Saminoski" class="coffee-link" target="_blank">
        <span class="coffee-icon">☕</span> Saved you from a late clock-in? Buy me a coffee if you'd like.
    </a>
</div>

<script>
    let currentDuration = 30;

    window.onload = function() {
        resetToNow();
        updateUSATimes();
        setInterval(updateUSATimes, 30000);
        document.addEventListener('click', (e) => {
            const popup = document.getElementById('timezonePopup');
            if (!document.getElementById('tzTrigger').contains(e.target)) popup.style.display = 'none';
        });
    };

    function togglePopup() {
        const p = document.getElementById('timezonePopup');
        p.style.display = (p.style.display === 'block') ? 'none' : 'block';
    }

    function updateUSATimes() {
        const zones = {'tz-et':'America/New_York','tz-ct':'America/Chicago','tz-mt':'America/Denver','tz-pt':'America/Los_Angeles'};
        for (const [id, zone] of Object.entries(zones)) {
            const el = document.getElementById(id);
            if(el) el.innerText = new Date().toLocaleTimeString('en-US', {timeZone: zone, hour: '2-digit', minute: '2-digit', hour12: true});
        }
    }

    function resetToNow() {
        const d = new Date();
        document.getElementById('startTime').value = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
        updateTime();
    }

    function setMode(m) {
        currentDuration = m;
        document.querySelectorAll('.btn-choice').forEach(b => b.classList.remove('active'));
        const activeBtn = document.querySelector(`.btn-choice[data-min="${m}"]`);
        if(activeBtn) activeBtn.classList.add('active');
        updateTime();
    }

    function updateTime() {
        const val = document.getElementById('startTime').value;
        if (!val) return;
        let [h, m] = val.split(':').map(Number);
        let adjust = currentDuration;
        const walkActive = document.getElementById('walkMode').checked;
        if (walkActive) {
            adjust -= 2;
            document.getElementById('statusLabel').innerText = "Leave for desk at";
        } else {
            document.getElementById('statusLabel').innerText = "Return to desk at";
        }
        let total = (h * 60) + m + adjust;
        if (total < 0) total += 1440;
        let resH = Math.floor((total / 60) % 24);
        let resM = Math.floor(total % 60);
        const ampm = resH >= 12 ? 'PM' : 'AM';
        const displayH = resH % 12 || 12;
        const displayM = String(resM).padStart(2, '0');
        
        document.getElementById('finalTime').innerHTML = `${displayH}:${displayM}<span class="ampm">${ampm}</span>`;
        document.getElementById('finalTime').style.color = walkActive ? "var(--buffer-color)" : "white";
        document.getElementById('calcLog').innerText = `(${currentDuration}m break${walkActive ? ' - 2m walk' : ''})`;
    }
</script>

</body>
</html>
